---
- name: Verify Ollama role
  hosts: all
  become: true
  tasks:
    - name: Check Ollama is installed
      ansible.builtin.command: which ollama
      register: ollama_bin
      changed_when: false

    - name: Ensure ollama binary exists
      ansible.builtin.assert:
        that: ollama_bin.rc == 0
        fail_msg: "ollama binary not found"

    - name: Check Ollama API port is listening
      ansible.builtin.command: ss -ltn '( sport = :11434 )'
      register: ollama_port
      changed_when: false
      failed_when: false

    - name: Ensure Ollama API port is listening
      ansible.builtin.assert:
        that:
          - ollama_port.stdout is search(':11434')
        fail_msg: "ollama API port 11434 is not listening"

    - name: Wait for Ollama API to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 11434
        state: started
        timeout: 60

    - name: Check Ollama API responds
      ansible.builtin.uri:
        url: http://127.0.0.1:11434/api/tags
        method: GET
      register: ollama_api
      failed_when: ollama_api.status != 200
