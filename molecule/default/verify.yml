---
- name: Verify Ollama role
  hosts: all
  become: true
  tasks:
    - name: Check Ollama is installed
      ansible.builtin.command: which ollama
      register: ollama_bin
      changed_when: false

    - name: Ensure ollama binary exists
      ansible.builtin.assert:
        that: ollama_bin.rc == 0
        fail_msg: "ollama binary not found"

    - name: Check Ollama service is running
      ansible.builtin.command: systemctl show -p ActiveState --value ollama
      register: ollama_service
      changed_when: false
      failed_when: false
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Check if Ollama systemd unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/ollama.service
      register: ollama_service_unit_etc
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Check if Ollama systemd unit exists (packaged path)
      ansible.builtin.stat:
        path: /lib/systemd/system/ollama.service
      register: ollama_service_unit_lib
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Ensure ollama service is active (when systemd unit exists)
      ansible.builtin.assert:
        that:
          - ollama_service.stdout | trim == 'active'
        fail_msg: "ollama service is not active (stdout={{ ollama_service.stdout | trim }}, stderr={{ ollama_service.stderr | trim }})"
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - (ollama_service_unit_etc.stat.exists | default(false)) or (ollama_service_unit_lib.stat.exists | default(false))

    - name: Wait for Ollama API to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 11434
        state: started
        timeout: 60

    - name: Check Ollama API responds
      ansible.builtin.uri:
        url: http://127.0.0.1:11434/api/tags
        method: GET
      register: ollama_api
      failed_when: ollama_api.status != 200
