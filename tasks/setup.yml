---
- name: Install prerequisites (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - curl
      - zstd
    state: present
    update_cache: "{{ ansible_facts['os_family'] == 'Debian' }}"
    cache_valid_time: 3600
  become: true
  when:
    - ollama__install_prerequisites | bool
    - ansible_facts['os_family'] == 'Debian'

- name: Install prerequisites (RHEL/Fedora)
  ansible.builtin.dnf:
    name:
      # curl-minimal is default on RHEL 9; full curl conflicts with it
      - curl  # Fedora, RHEL 8 and earlier
      - zstd
    state: present
  become: true
  when:
    - ollama__install_prerequisites | bool
    - ansible_facts['os_family'] == 'RedHat'
    # RHEL 9+ has curl-minimal; installing curl causes depsolve conflicts
    - ansible_facts['distribution_major_version'] | int < 9

- name: Install prerequisites (RHEL 9+ / Fedora 36+)
  ansible.builtin.dnf:
    name: zstd
    state: present
  become: true
  when:
    - ollama__install_prerequisites | bool
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_facts['distribution_major_version'] | int >= 9

- name: Install prerequisites (Arch)
  ansible.builtin.pacman:
    name:
      - curl
      - zstd
    state: present
  become: true
  when:
    - ollama__install_prerequisites | bool
    - ansible_facts['os_family'] == 'Archlinux'

- name: Check if Ollama binary exists
  ansible.builtin.command: which ollama
  register: ollama_binary_exists
  changed_when: false
  failed_when: false

- name: Check if Ollama systemd service exists
  ansible.builtin.stat:
    path: /etc/systemd/system/ollama.service
  register: ollama_service_exists
  become: true
  when: ansible_facts['service_mgr'] == 'systemd'

- name: Set Ollama needs install
  ansible.builtin.set_fact:
    ollama_needs_install: "{{ ollama_binary_exists.rc != 0 or (ollama_service_exists is defined and ollama_service_exists.stat.exists | default(false) | bool == false) }}"

- name: Install Ollama via official install script
  ansible.builtin.shell: |
    curl -fsSL https://ollama.com/install.sh | {{ 'OLLAMA_VERSION=' + ollama__version + ' ' if ollama__version else '' }}sh
  environment:
    OLLAMA_VERSION: "{{ ollama__version if ollama__version else omit }}"
  become: true
  when: ollama_needs_install

- name: Create systemd override directory for Ollama
  ansible.builtin.file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    mode: '0755'
  become: true
  when: ansible_facts['service_mgr'] == 'systemd'

- name: Create systemd override for OLLAMA_HOST
  ansible.builtin.copy:
    dest: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="OLLAMA_HOST={{ ollama__host }}:{{ ollama__port }}"
    force: true
  become: true
  notify: restart ollama
  when: ansible_facts['service_mgr'] == 'systemd'

# Use systemctl CLI: ansible.builtin.systemd can fail in Docker/CI (DBus) with
# "Could not find the requested service" even when the unit file exists.
- name: Ensure Ollama systemd service is enabled
  ansible.builtin.shell: |
    set -e
    systemctl daemon-reload
    systemctl {{ 'enable' if ollama__enabled | bool else 'disable' }} ollama
  become: true
  when: ansible_facts['service_mgr'] == 'systemd'
  register: ollama_systemd_enable
  changed_when: >-
    ('created symlink' in ((ollama_systemd_enable.stdout | default('') ~ ollama_systemd_enable.stderr | default('')) | lower))
    or ('removed' in ((ollama_systemd_enable.stdout | default('') ~ ollama_systemd_enable.stderr | default('')) | lower))
  failed_when: ollama_systemd_enable.rc != 0

- name: Ensure Ollama systemd service is {{ ollama__state }}
  ansible.builtin.command: "systemctl {{ {'started': 'start', 'stopped': 'stop', 'restarted': 'restart'}[ollama__state] }} ollama"
  become: true
  when:
    - ansible_facts['service_mgr'] == 'systemd'
    - ollama__state in ['started', 'stopped', 'restarted']
  register: ollama_systemd_state
  changed_when: false

- name: Wait for Ollama service to become active (systemd)
  ansible.builtin.command: systemctl show -p ActiveState --value ollama
  register: ollama_systemd_active_state
  changed_when: false
  failed_when: false
  until: ollama_systemd_active_state.stdout | trim == 'active'
  retries: 20
  delay: 1
  become: true
  when:
    - ansible_facts['service_mgr'] == 'systemd'
    - ollama__state in ['started', 'restarted']

- name: Ensure Ansible remote_tmp exists for ollama user
  ansible.builtin.file:
    path: /usr/share/ollama/.ansible/tmp
    state: directory
    owner: ollama
    group: ollama
    mode: '0755'
  become: true
  when:
    - ollama__models | length > 0
    - ollama__state == 'started'

- name: Determine Ollama API probe host
  ansible.builtin.set_fact:
    ollama_api_probe_host: >-
      {{ 'localhost' if ollama__host in ['127.0.0.1', '0.0.0.0', '::', '::1'] else ollama__host }}

- name: Ensure Ollama API is reachable
  when:
    - ollama__state in ['started', 'restarted']
  block:
    - name: Wait for Ollama API to be ready
      ansible.builtin.wait_for:
        host: "{{ ollama_api_probe_host }}"
        port: "{{ ollama__port }}"
        state: started
        timeout: "{{ ollama__api_ready_timeout }}"
  rescue:
    - name: Capture systemd status for Ollama
      ansible.builtin.command: systemctl status ollama --no-pager -l
      register: ollama_systemd_status
      changed_when: false
      failed_when: false
      become: true
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Capture recent Ollama journal logs
      ansible.builtin.command: journalctl -u ollama --no-pager -n 80
      register: ollama_journal
      changed_when: false
      failed_when: false
      become: true
      when: ansible_facts['service_mgr'] == 'systemd'

    - name: Start Ollama directly as fallback
      ansible.builtin.shell: |
        set -e
        OLLAMA_BIN="$(command -v ollama)"
        if [ -z "${OLLAMA_BIN}" ]; then
          echo "ollama binary not found in PATH" >&2
          exit 1
        fi
        if ! pgrep -f '[o]llama serve' >/dev/null 2>&1; then
          nohup "${OLLAMA_BIN}" serve >/tmp/ollama-standalone.log 2>&1 &
        fi
      args:
        executable: /bin/bash
      changed_when: false
      become: true
      become_user: ollama
      environment:
        OLLAMA_HOST: "{{ ollama__host }}:{{ ollama__port }}"
      when: ollama__fallback_direct_serve | bool

    - name: Wait for Ollama API after fallback start
      ansible.builtin.wait_for:
        host: "{{ ollama_api_probe_host }}"
        port: "{{ ollama__port }}"
        state: started
        timeout: "{{ ollama__api_ready_timeout }}"
      register: ollama_fallback_wait
      failed_when: false
      when: ollama__fallback_direct_serve | bool

    - name: Read fallback ollama log
      ansible.builtin.command: tail -n 80 /tmp/ollama-standalone.log
      register: ollama_fallback_log
      changed_when: false
      failed_when: false
      become: true
      when: ollama__fallback_direct_serve | bool

    - name: Fail if Ollama API remains unreachable
      ansible.builtin.fail:
        msg: |
          Ollama API did not become reachable on {{ ollama_api_probe_host }}:{{ ollama__port }}.
          systemctl status output:
          {{ ollama_systemd_status.stdout | default('') }}
          journalctl output:
          {{ ollama_journal.stdout | default('') }}
          fallback log output:
          {{ ollama_fallback_log.stdout | default('') }}
      when: >-
        (not ollama__fallback_direct_serve | bool)
        or (ollama_fallback_wait is defined and ollama_fallback_wait.failed | default(false))

- name: Get installed Ollama models
  ansible.builtin.command: ollama list
  become: true
  become_user: ollama
  environment:
    OLLAMA_HOST: "{{ ollama__host }}:{{ ollama__port }}"
  register: ollama_installed_models
  changed_when: false
  when:
    - ollama__models | length > 0
    - ollama__state == 'started'

- name: Pull Ollama models
  ansible.builtin.command: ollama pull {{ item }}
  become: true
  become_user: ollama
  environment:
    OLLAMA_HOST: "{{ ollama__host }}:{{ ollama__port }}"
  loop: "{{ ollama__models }}"
  when:
    - ollama__models | length > 0
    - ollama__state == 'started'
    - ollama_installed_models is defined
    - ollama_installed_models.stdout is not search('(^|\\n)' + (item | regex_escape) + '(\\s|:)')
